<!DOCTYPE html>
<html>
<head>
  <title>Development Deal Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 850px; margin: auto; }
    h2 { margin-bottom: 10px; }
    h3 { margin-top: 20px; }
    label { display:block; margin-top:10px; font-size:14px; }
    input { width:100%; padding:10px; margin-top:5px; font-size:15px; box-sizing:border-box; }
    button { width:100%; padding:14px; margin-top:20px; background:#111; color:white; border:none; font-size:16px; cursor:pointer; }
    .card { border:1px solid #ddd; padding:15px; border-radius:12px; margin-top:15px; }
    .row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px dashed #eee; }
    .row:last-child { border-bottom:none; }
    .k { color:#333; }
    .v { font-weight:700; text-align:right; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; }
  </style>
</head>
<body>

<h2>Development Deal Calculator</h2>

<div class="card">
<h3>Financing</h3>
<div class="grid">
<div>
<label>Project Length (months) (D6)</label>
<input id="months" type="number">
</div>
<div>
<label>Interest Rate (%) (D7)</label>
<input id="interestPct" type="number">
</div>
<div>
<label>LTV (%) (D9)</label>
<input id="ltvPct" type="number">
</div>
<div>
<label>Origination Fee (%) (D10)</label>
<input id="origPct" type="number">
</div>
</div>

<h3>Acquisition</h3>
<div class="grid">
<div>
<label>Purchase Price (D12)</label>
<input id="purchase" type="number">
</div>
<div>
<label>Total Sale Price (D15)</label>
<input id="sale" type="number">
</div>
</div>

<h3>Construction</h3>
<div class="grid">
<div>
<label>Total Sq Ft</label>
<input id="sqft" type="number">
</div>
<div>
<label>Build Cost per Sq Ft</label>
<input id="buildPerSqft" type="number">
</div>
<div>
<label>Demolition (TOTAL $) (D33)</label>
<input id="demoTotal" type="number">
</div>
</div>

<h3>Other</h3>
<div class="grid">
<div>
<label>HOA per Month</label>
<input id="hoaPerMonth" type="number">
</div>
<div>
<label>Wholesale Fee (D48)</label>
<input id="wholesale" type="number">
</div>
<div>
<label>Additional Fees (D23)</label>
<input id="additionalFees" type="number">
</div>
<div>
<label>Other Fees (D14)</label>
<input id="otherFees" type="number">
</div>
<div>
<label>Property Tax Rate (%)</label>
<input id="propTaxPct" type="number">
</div>
<div>
<label>Commission Rate (%)</label>
<input id="commissionPct" type="number">
</div>
</div>

<button onclick="calculate()">Calculate</button>
</div>

<div class="card">
<h3>Results (All Formula Cells)</h3>
<div id="results">Enter inputs and click Calculate.</div>
</div>

<script>
function n(id){
  let v = parseFloat(document.getElementById(id).value);
  return isNaN(v) ? 0 : v;
}

function money(x){
  return "$" + Math.round(x).toLocaleString();
}

function calculate(){

let months = n("months");
let interest = n("interestPct") / 100;
let ltv = n("ltvPct") / 100;
let origPct = n("origPct") / 100;
let purchase = n("purchase");
let sale = n("sale");

let sqft = n("sqft");
let buildPerSqft = n("buildPerSqft");
let demoTotal = n("demoTotal");

let hoaPerMonth = n("hoaPerMonth");
let wholesale = n("wholesale");
let additionalFees = n("additionalFees");
let otherFees = n("otherFees");

let propTaxRate = n("propTaxPct") / 100;
let commissionRate = n("commissionPct") / 100;

// D8 Monthly Rate
let monthlyRate = interest / 12;

// D37 Total Build Cost
let buildTotal = (sqft * buildPerSqft) + demoTotal;

// Selling Costs
let commissions = sale * commissionRate;
let countyTransferTax = 1.1 * (sale / 1000);
let cityTransferTax = 4.5 * (sale / 1000);
let escrowFee = 0.0015 * sale;
let titleInsurance = 0.0014 * sale;
let taxesAndFees = countyTransferTax + cityTransferTax + escrowFee + titleInsurance + additionalFees;
let totalSellingCosts = commissions + taxesAndFees;
let subtotalAfterSelling = sale - totalSellingCosts;

// Loan
let loanPayoff = ltv * purchase;
let subtotalAfterLoan = subtotalAfterSelling - loanPayoff;

// Holding
let acquisitionHoldingCost = purchase * ltv * (monthlyRate * months);
let constructionHoldingCost = (monthlyRate * months) * buildTotal;
let hoaDues = hoaPerMonth * months;
let propertyTaxes = ((propTaxRate * purchase) / 12) * months;
let totalHoldingCosts = acquisitionHoldingCost + constructionHoldingCost + hoaDues + propertyTaxes;

// Overhead
let totalOverhead = buildTotal + totalHoldingCosts;

// Equity
let downpayment = (1 - ltv) * purchase;
let originationFee = origPct * loanPayoff;

// Profit
let pl = subtotalAfterLoan - totalOverhead - downpayment - originationFee - otherFees - wholesale;

// Return
let denom = totalHoldingCosts + downpayment + originationFee + wholesale + otherFees + hoaDues + propertyTaxes;
let returnOnOOP = denom !== 0 ? (pl / denom) : 0;

document.getElementById("results").innerHTML = `
<div class="row"><div class="k">Monthly Rate (D8)</div><div class="v">${(monthlyRate*100).toFixed(2)}%</div></div>
<div class="row"><div class="k">Total Build Cost (D37)</div><div class="v">${money(buildTotal)}</div></div>
<div class="row"><div class="k">Total Selling Costs (D25)</div><div class="v">${money(totalSellingCosts)}</div></div>
<div class="row"><div class="k">Loan Payoff (D29)</div><div class="v">${money(loanPayoff)}</div></div>
<div class="row"><div class="k">Total Holding Costs (D43)</div><div class="v">${money(totalHoldingCosts)}</div></div>
<div class="row"><div class="k">Total Overhead (D44)</div><div class="v">${money(totalOverhead)}</div></div>
<div class="row"><div class="k">Downpayment (D46)</div><div class="v">${money(downpayment)}</div></div>
<div class="row"><div class="k">Origination Fee (D47)</div><div class="v">${money(originationFee)}</div></div>
<div class="row"><div class="k"><b>P/L (D50)</b></div><div class="v">${money(pl)}</div></div>
<div class="row"><div class="k"><b>Return on Out-of-Pocket (D51)</b></div><div class="v">${(returnOnOOP*100).toFixed(2)}%</div></div>
`;
}
</script>

</body>
</html>
