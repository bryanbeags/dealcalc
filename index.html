<!DOCTYPE html>
<html>
<head>
<title>Development Deal Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;padding:20px;max-width:900px;margin:auto;}
h2{margin-bottom:10px}
.card{border:1px solid #ddd;border-radius:12px;padding:15px;margin-top:15px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:13px;margin-top:10px;display:block}
input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px}
button{width:100%;padding:14px;margin-top:15px;background:#111;color:#fff;border:none;border-radius:10px}
.row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed #eee}
.section{font-weight:bold;margin-top:12px}
</style>

</head>
<body>

<h2>Development Deal Calculator</h2>

<div class="card">

<div class="grid">

<div>
<label>Project Length (months) D6</label>
<input id="D6" type="number">
</div>

<div>
<label>Interest Rate D7</label>
<input id="D7" type="number">
</div>

<div>
<label>LTV D9</label>
<input id="D9" type="number">
</div>

<div>
<label>Origination Fee % D10</label>
<input id="D10" type="number">
</div>

<div>
<label>Purchase Price D12</label>
<input id="D12" type="number">
</div>

<div>
  <label>Purchase Closing Costs</label>
  <input id="PURCHASE_CC" type="number">
</div>

<div>
<label>Total Sale Price D15</label>
<input id="D15" type="number">
</div>

<div>
<label>Demolition D33</label>
<input id="D33" type="number">
</div>

<div>
<label>Build Cost per SqFt D34</label>
<input id="D34" type="number">
</div>

<div>
<label>Total SqFt D35</label>
<input id="D35" type="number">
</div>

<div>
<label>Wholesale Fee D48</label>
<input id="D48" type="number">
</div>

<div>
<label>HOA Fee (variable)</label>
<input id="HOA" type="number" value="700">
</div>

<div>
<label>Property Tax Rate</label>
<input id="PTAX" type="number" value="0.0125">
</div>

<div>
<label>Commission Rate</label>
<input id="COMM" type="number" value="0.04">
</div>

<div>
<label>Escrow Rate</label>
<input id="ESCROW" type="number" value="0.0015">
</div>

<div>
<label>Title Rate</label>
<input id="TITLE" type="number" value="0.0014">
</div>

<div>
<label>County Transfer Tax</label>
<input id="CTAX" type="number" value="1.1">
</div>

<div>
<label>City Transfer Tax</label>
<input id="CITYTAX" type="number" value="4.5">
</div>

</div>

<button onclick="calc()">Calculate</button>

</div>

<div class="card">

<div id="results"></div>

</div>

<script>

function num(id){
let v=parseFloat(document.getElementById(id).value)
return isNaN(v)?0:v
}

function rate(v){
return v>1?v/100:v
}

function money(x){
return "$"+Math.round(x).toLocaleString()
}

function row(label,val){
return `<div class="row"><div>${label}</div><div><b>${val}</b></div></div>`
}

function calc(){

let D6=num("D6")
let D7=rate(num("D7"))
let D9=rate(num("D9"))
let D10=rate(num("D10"))
let D12=num("D12")
let PURCHASE_CC=num("PURCHASE_CC")
let D15=num("D15")

let D33=num("D33")
let D34=num("D34")
let D35=num("D35")
let D48=num("D48")

let HOA=num("HOA")

let COMM=rate(num("COMM"))
let ESCROW=rate(num("ESCROW"))
let TITLE=rate(num("TITLE"))
let PTAX=rate(num("PTAX"))

let CTAX=num("CTAX")
let CITYTAX=num("CITYTAX")

let D8=D7/12
let D29=D9*D12
let D13=D10*D29

let D18=D15*COMM
let D19=CTAX*(D15/1000)
let D20=CITYTAX*(D15/1000)
let D21=ESCROW*D15
let D22=TITLE*D15
let D23=2000

let D24=D19+D20+D21+D22+D23
let D25=D18+D24
let D26=D15-D25

let D30=D26-D29

let D37=(D35*D34)+D33
let D38=D37+D33

let D39=D12*D9*(D8*D6)
let D40=(D8*D6)*D38

let D41=HOA
let D42=((PTAX*D12)/12)*D6

let D43=D39+D40+D41+D42
let D44=D38+D43

let D46=(1-D9)*D12
let D47=D10*D29

let D50=D30-D44-D46-D47-D48-PURCHASE_CC

let denom=D43+D46+D47+D48+D41+D42+PURCHASE_CC
let D51=denom?D50/denom:0

document.getElementById("results").innerHTML=

row("Project Length (months)",D6)+
row("Interest Rate",(D7*100).toFixed(2)+"%")+
row("Monthly Rate",(D8*100).toFixed(2)+"%")+
row("LTV",(D9*100).toFixed(2)+"%")+
row("Origination Fee %",(D10*100).toFixed(2)+"%")+
row("Purchase Price",money(D12))+
row("Origination Fee $",money(D13))+
row("Total Sale Price",money(D15))+

`<div class="section">Selling Costs</div>`+

row("Commissions",money(D18))+
row("County Transfer Tax",money(D19))+
row("City Transfer Tax",money(D20))+
row("Escrow Fee",money(D21))+
row("Title Insurance",money(D22))+
row("Additional Fees",money(D23))+
row("Taxes & Fees",money(D24))+
row("Total Selling Costs",money(D25))+
row("Subtotal",money(D26))+

`<div class="section">Loan Payoff</div>`+

row("Loan Payoff",money(D29))+
row("Subtotal",money(D30))+

`<div class="section">Overhead</div>`+

row("Demolition",money(D33))+
row("Build Cost per SqFt",money(D34))+
row("Total SqFt",money(D35))+
row("Total Build Cost",money(D37))+
row("Total Reno Cost",money(D38))+
row("Acquisition Holding Cost",money(D39))+
row("Construction Holding Cost",money(D40))+
row("HOA Fee",money(D41))+
row("Property Taxes",money(D42))+
row("Total Holding Costs",money(D43))+
row("Total Overhead",money(D44))+

`<div class="section">Equity</div>`+

row("Downpayment",money(D46))+
row("Origination Fee",money(D47))+
row("Purchase Closing Costs",money(PURCHASE_CC))+
row("Wholesale Fee",money(D48))+

`<div class="section">Bottom Line</div>`+

row("Profit / Loss",money(D50))+
row("Return on Out of Pocket",(D51*100).toFixed(2)+"%")

}

</script>

</body>
</html>
