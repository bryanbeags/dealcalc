<!DOCTYPE html>
<html>
<head>
<title>Development Deal Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;padding:18px;max-width:920px;margin:auto;}
h2{margin:0 0 8px;}
h3{margin:18px 0 8px;}
.card{border:1px solid #ddd;border-radius:14px;padding:14px;margin:14px 0;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
label{display:block;margin:10px 0 6px;font-size:13px;}
input{width:100%;padding:10px;font-size:15px;border:1px solid #ccc;border-radius:10px;}
button{width:100%;padding:14px;background:#111;color:white;border:none;border-radius:12px;margin-top:12px;}
.row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed #eee;}
.sectionTitle{font-weight:bold;margin-top:10px;}
</style>
</head>

<body>

<h2>Development Deal Calculator</h2>

<div class="card">

<h3>Inputs</h3>

<div class="grid">

<div>
<label>Project Length (months)</label>
<input id="D6" type="number">
</div>

<div>
<label>Interest Rate</label>
<input id="D7" type="number">
</div>

<div>
<label>LTV</label>
<input id="D9" type="number">
</div>

<div>
<label>Origination Fee %</label>
<input id="D10" type="number">
</div>

<div>
<label>Purchase Price</label>
<input id="D12" type="number">
</div>

<div>
<label>Total Sale Price</label>
<input id="D15" type="number">
</div>

<div>
<label>Additional Fees</label>
<input id="D23_in" type="number">
</div>

<div>
<label>Demolition</label>
<input id="D33" type="number">
</div>

<div>
<label>Build Cost / Sq Ft</label>
<input id="D34" type="number">
</div>

<div>
<label>Total Sq Ft</label>
<input id="D35" type="number">
</div>

<div>
<label>Wholesale Fee</label>
<input id="D48" type="number">
</div>

<div>
<label>HOA Fees</label>
<input id="HOA_PM" type="number" value="700">
</div>

<div>
<label>Property Tax Rate</label>
<input id="PTAX" type="number" value="0.0125">
</div>

<div>
<label>Commission Rate</label>
<input id="COMM" type="number" value="0.04">
</div>

<div>
<label>Escrow Rate</label>
<input id="ESCROW" type="number" value="0.0015">
</div>

<div>
<label>Title Rate</label>
<input id="TITLE" type="number" value="0.0014">
</div>

<div>
<label>County Transfer Tax</label>
<input id="CTAX" type="number" value="1.1">
</div>

<div>
<label>City Transfer Tax</label>
<input id="CITYTAX" type="number" value="4.5">
</div>

</div>

<button onclick="calc()">Calculate</button>

</div>

<div class="card">

<h3>Results</h3>
<div id="out"></div>

</div>

<script>

function num(id){
let v=parseFloat(document.getElementById(id).value);
return isNaN(v)?0:v;
}

function rate(v){
return v>1?v/100:v;
}

function money(x){
return "$"+Math.round(x).toLocaleString();
}

function row(label,value){
return `<div class="row"><div>${label}</div><div><b>${value}</b></div></div>`
}

function calc(){

let D6=num("D6")
let D7=rate(num("D7"))
let D9=rate(num("D9"))
let D10=rate(num("D10"))
let D12=num("D12")
let D15=num("D15")
let D23=num("D23_in")

let D33=num("D33")
let D34=num("D34")
let D35=num("D35")
let D48=num("D48")

let HOA=num("HOA_PM")

let COMM=rate(num("COMM"))
let ESCROW=rate(num("ESCROW"))
let TITLE=rate(num("TITLE"))
let PTAX=rate(num("PTAX"))

let CTAX=num("CTAX")
let CITYTAX=num("CITYTAX")

let D8=D7/12

let D29=D9*D12
let D13=D10*D29

let D18=D15*COMM
let D19=CTAX*(D15/1000)
let D20=CITYTAX*(D15/1000)
let D21=ESCROW*D15
let D22=TITLE*D15

let D24=D19+D20+D21+D22+D23
let D25=D18+D24
let D26=D15-D25

let D30=D26-D29

let D37=(D35*D34)+D33
let D38=D37+D33

let D39=D12*D9*(D8*D6)
let D40=(D8*D6)*D38

let D41=HOA
let D42=((PTAX*D12)/12)*D6

let D43=D39+D40+D41+D42
let D44=D38+D43

let D46=(1-D9)*D12
let D47=D10*D29

let D50=D30-D44-D46-D47-D48

let denom=D43+D46+D47+D48
let D51=denom?D50/denom:0

document.getElementById("out").innerHTML=

row("Monthly Rate", (D8*100).toFixed(2)+"%")+
row("Origination Fee",money(D13))+
row("Total Selling Costs",money(D25))+
row("Loan Payoff",money(D29))+
row("Subtotal",money(D30))+

`<div class="sectionTitle">Construction</div>`+

row("Total Build Cost",money(D37))+
row("Total Reno Cost",money(D38))+

`<div class="sectionTitle">Holding Costs</div>`+

row("Acquisition Holding",money(D39))+
row("Construction Holding",money(D40))+
row("HOA Fees",money(D41))+
row("Property Taxes",money(D42))+
row("Total Holding Costs",money(D43))+

`<div class="sectionTitle">Totals</div>`+

row("Total Overhead",money(D44))+
row("Downpayment",money(D46))+
row("Origination Fee",money(D47))+
row("Wholesale Fee",money(D48))+

`<div class="sectionTitle">Profit</div>`+

row("Profit / Loss",money(D50))+
row("Return on Out-of-Pocket",(D51*100).toFixed(2)+"%")

}

</script>

</body>
</html>
